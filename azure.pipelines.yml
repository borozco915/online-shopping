trigger:
  branches:
    include:
      - main
      - dev

variables:
  imageName: taskmanager

stages:
- stage: Build
  jobs:
  - job: BuildImage
    pool:
      name: 'Default'   # 👈 CHANGE THIS
    steps:

    - script: echo "Running on self-hosted agent"
      displayName: 'Verify Agent'

    - task: Docker@2
      inputs:
        containerRegistry: 'shoppingacr123'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(Build.BuildId)
