trigger:
- main

variables:
  imageName: 'taskmanager-app'
  containerRegistry: 'myacrname.azurecr.io'
  tag: '$(Build.BuildId)'

stages:

- stage: Build
  jobs:
  - job: Build
    pool:
      name: 'Default'   # 👈 KEY CHANGE
    steps:
    - task: AzureCLI@2
      displayName: Login to ACR
      inputs:
        azureSubscription: 'Azure subscription 1(05d41934-234a-4887-a212-e032ae353899)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name shoppingacr123
    - script: |
          docker buildx create --use

          docker buildx build \
          --platform linux/amd64 \
          -t shoppingacr123.azurecr.io/taskmanager-app:$(Build.BuildId) \
          -t shoppingacr123.azurecr.io/taskmanager-app:latest \
          --push .
    displayName: Build and Push (AMD64 ONLY)

- stage: Deploy
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      name: 'Default'   # 👈 SAME HERE (optional but common)
    steps:

    - task: AzureContainerApps@1
      inputs:
        azureSubscription: 'Azure subscription 1(05d41934-234a-4887-a212-e032ae353899)'
        ContainerAppName: 'taskmanager-app'
        resourceGroup: 'taskmanager-rg'
        imageToDeploy: 'shoppingacr123.azurecr.io/taskmanager-app:$(Build.BuildId)'