trigger:
- main

variables:
  imageName: borozcoshoppingmicroservices
  acrLoginServer: shoppingacr123.azurecr.io
  imageTag: $(Build.BuildId)
  containerAppName: taskmanager-rg
  resourceGroup: shopping-rg

stages:
- stage: BuildAndPush
  displayName: Build and Push to ACR
  jobs:
  - job: Build
    pool:
      name: 'Default'   # your self-hosted agent

    steps:

    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        containerRegistry: 'shoppingacr123'
        repository: $(imageName)
        command: buildAndPush
        Dockerfile: '**/Dockerfile'
        tags: |
          $(imageTag)
        arguments: '--platform linux/amd64'

- stage: Deploy
  displayName: Deploy to Azure Container App
  dependsOn: BuildAndPush
  jobs:
  - job: Deploy
    pool:
      name: 'Default'

    steps:

    - task: AzureCLI@2
      displayName: Deploy Container App Revision
      inputs:
        azureSubscription: 'Azure subscription 1(05d41934-234a-4887-a212-e032ae353899)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |

          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG